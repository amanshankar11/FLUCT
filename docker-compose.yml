services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: pulsewatch
      POSTGRES_USER: pulsewatch
      POSTGRES_PASSWORD: pulsewatch_dev
    ports:
      - "55432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pulsewatch -d pulsewatch"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
